{% extends "base.html" %}
{% block title %}Новости — АРТ-Кожа{% endblock %}
{% block content %}
<section class="page-hero"><div class="container">
  <div class="eyebrow">Журнал</div><h1>Новости мануфактуры</h1>
</div></section>
<div class="container"><div class="breadcrumbs"><a href="{{ url_for('index') }}">Главная</a> / Новости</div></div>
<section class="block" style="padding-top:20px"><div class="container"><div style="max-width:820px;margin:0 auto">
  {% for n in items %}
  <div class="news-item">
    <div class="date">{{ n.date }}</div>
    <div>
      <h3><a href="{{ url_for('news_item', nid=n.id) }}">{{ n.title }}</a></h3>
      <p>{{ n.summary }}</p>
    </div>
  </div>
  {% endfor %}
</div></div></section>
{% endblock %}
